name: release

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ''
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: ''
            packages: gcc-aarch64-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: '.exe'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
      - name: Install cross-compilation packages
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ios-uploader-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/ios-uploader${{ matrix.suffix }}

  upload-release-assets:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Rename binaries with platform names
        run: |
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            bin="$dir"ios-uploader
            if [ -f "$bin" ]; then
              case "$name" in
                *x86_64-unknown-linux-gnu)   mv "$bin" "$dir"ios-uploader-linux-amd64 ;;
                *aarch64-unknown-linux-gnu)   mv "$bin" "$dir"ios-uploader-linux-arm64 ;;
                *x86_64-apple-darwin)         mv "$bin" "$dir"ios-uploader-darwin-amd64 ;;
                *aarch64-apple-darwin)        mv "$bin" "$dir"ios-uploader-darwin-arm64 ;;
                *windows-msvc)                mv "$bin.exe" "$dir"ios-uploader-windows-amd64.exe 2>/dev/null || true ;;
                *windows-gnu)                 mv "$bin.exe" "$dir"ios-uploader-windows-amd64.exe 2>/dev/null || true ;;
              esac
            fi
          done
          ls -lh artifacts/*/
      - name: Upload release assets
        uses: AButler/upload-release-assets@v4.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          files: "artifacts/*/*"
